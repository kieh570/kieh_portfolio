  <style>
    body {
      background:#f8fafc;
      color:#000000;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Times New Roman', Times, serif;
    }

    .hero {
      background:#0d6efd;
      color: white;
        height: 60vh;
      display: flex;
      align-items: center;
      text-align: center;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 40px 0;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      transition: all 0.4s ease;
    }

    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.15);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 20px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .gallery-item:hover .overlay {
      opacity: 1;
    }

    .star-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #F1F1F1;
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    .modal-content {
      background: #a0cdd3;
      border: none;
      border-radius: 20px;
    }
  </style>
</head>
